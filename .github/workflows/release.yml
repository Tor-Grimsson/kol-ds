name: Release

# Publishes @kolkrabbi/kol-* to npm whenever changesets land on main.
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights
# on the @kolkrabbi scope). GITHUB_TOKEN is provided automatically.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # Roster completeness gate — every barrel export must be classified or
      # exempted (scripts/validate-roster.mjs); red build otherwise.
      - name: Validate roster
        run: pnpm validate:roster

      # De-fork lock — no vendored package code in showcase/src (P0-3).
      - name: Validate imports
        run: pnpm validate:imports

      # Opens/updates a "Version Packages" PR; when that PR merges, publishes.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

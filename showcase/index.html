<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon-kol-ds.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kol-labs</title>
    <!-- Theme boot: LIGHT default (per-repo preference), restore the user's
         saved toggle before first paint. Versioned: v2 marks the light-default
         cutover — saved themes from before it (incl. the old workshop `theme`
         key) are discarded once so stale dark can't win over the new default. -->
    <script>
      try {
        if (localStorage.getItem('kol-theme-v') !== '2') {
          localStorage.removeItem('kol-theme')
          localStorage.removeItem('theme')
          localStorage.setItem('kol-theme-v', '2')
        }
      } catch (e) {}
      document.documentElement.dataset.theme =
        localStorage.getItem('kol-theme') || 'light'
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
